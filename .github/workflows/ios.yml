name: iOS build (touchHLE)
on:
  workflow_dispatch:
  push:
    paths:
      - "touchHLE/**"
      - ".github/workflows/ios.yml"
env:
  CARGO_TERM_COLOR: always
  IPHONEOS_DEPLOYMENT_TARGET: "14.0"
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
jobs:
  ios-app:
    runs-on: macos-15
    permissions:
      contents: write
    defaults:
      run:
        working-directory: touchHLE
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
      - name: Fetch vendor dependencies
        run: |
          git config --global advice.detachedHead false
          fetch_dep () {
            rm -rf "$1"; mkdir -p "$1"
            git -C "$1" init -q
            git -C "$1" remote add origin "$2"
            for i in 1 2 3 4 5; do
              if git -C "$1" fetch --depth 1 origin "$3"; then
                git -C "$1" checkout -q FETCH_HEAD
                return 0
              fi
              echo "retry $i for $2 ..."; sleep 15
            done
            echo "FAILED to fetch $2"; return 1
          }
          fetch_dep vendor/SDL https://github.com/libsdl-org/SDL.git 07d0f51fa292895443f563f0cbde4cb3802d87fa
          fetch_dep vendor/dynarmic https://github.com/touchHLE/dynarmic.git HEAD
          fetch_dep vendor/openal-soft https://github.com/kcat/openal-soft HEAD
          fetch_dep vendor/stb https://github.com/nothings/stb.git dev
          git -C vendor/dynarmic submodule update --init --recursive --depth 1
      - name: Restore embedded data files
        run: |
          mkdir -p touchHLE_apps res vendor/PVRTDecompress
          [ -f touchHLE_apps/README.txt ] || printf 'touchHLE apps dir.\n' > touchHLE_apps/README.txt
          [ -f OPTIONS_HELP.txt ] || printf 'options help (placeholder).\n' > OPTIONS_HELP.txt
          [ -f touchHLE_options.txt ] || : > touchHLE_options.txt
          [ -f vendor/PVRTDecompress/LICENSE.md ] || printf 'PowerVR SDK license (placeholder).\n' > vendor/PVRTDecompress/LICENSE.md
          PNG_B64='iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M8AAAMBAQAY3Y2wAAAAAElFTkSuQmCC'
          for p in res/icon.png res/icon_unofficial.png res/icon_preview.png; do
            [ -f "$p" ] || printf '%s' "$PNG_B64" | openssl base64 -A -d > "$p"
          done
      - name: Install Boost
        run: |
          brew install boost
          ln -sfn "$(brew --prefix boost)/include" vendor/boost
      - name: Add Rust iOS target
        run: rustup target add aarch64-apple-ios
      - name: Build touchHLE executable (aarch64-apple-ios)
        run: |
          set -euo pipefail
          SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"
          cat > "$RUNNER_TEMP/ios-toolchain.cmake" <<EOF
          set(CMAKE_SYSTEM_NAME iOS)
          set(CMAKE_OSX_SYSROOT "$SDK_PATH" CACHE STRING "iOS SDK" FORCE)
          set(CMAKE_OSX_ARCHITECTURES "arm64" CACHE STRING "" FORCE)
          set(CMAKE_OSX_DEPLOYMENT_TARGET "$IPHONEOS_DEPLOYMENT_TARGET" CACHE STRING "" FORCE)
          EOF
          export SDKROOT="$SDK_PATH"
          export CMAKE_OSX_SYSROOT="$SDK_PATH"
          export CMAKE_OSX_SYSROOT_aarch64_apple_ios="$SDK_PATH"
          export CMAKE_TOOLCHAIN_FILE_aarch64_apple_ios="$RUNNER_TEMP/ios-toolchain.cmake"
          FW="Foundation UIKit CoreGraphics QuartzCore OpenGLES CoreVideo CoreAudio AudioToolbox AVFoundation CoreMotion CoreBluetooth CoreHaptics GameController Metal"
          LINKARGS="-Clink-arg=-lobjc"
          for f in $FW; do LINKARGS="$LINKARGS -Clink-arg=-framework -Clink-arg=$f"; done
          export CARGO_TARGET_AARCH64_APPLE_IOS_RUSTFLAGS="$LINKARGS"
          env "CMAKE_OSX_SYSROOT_aarch64-apple-ios=$SDK_PATH" \
              "CMAKE_TOOLCHAIN_FILE_aarch64-apple-ios=$RUNNER_TEMP/ios-toolchain.cmake" \
              cargo build --release --target aarch64-apple-ios --bin touchHLE 2>&1 | tee build-ios.log
      - name: Package signed iOS app (.ipa + rootless .deb)
        run: |
          set -euo pipefail
          brew install ldid dpkg
          BIN=target/aarch64-apple-ios/release/touchHLE
          file "$BIN"
          APP="$RUNNER_TEMP/Payload/touchHLE.app"
          rm -rf "$RUNNER_TEMP/Payload" "$RUNNER_TEMP/deb"
          mkdir -p "$APP"
          cp "$BIN" "$APP/touchHLE"; chmod +x "$APP/touchHLE"
          # ---- App icon (packaging only; generated from build-ios/AppIcon1024.png) ----
          ICON_SRC=build-ios/AppIcon1024.png
          if [ -f "$ICON_SRC" ]; then
            sips -z 120 120 "$ICON_SRC" --out "$APP/AppIcon60x60@2x.png"
            sips -z 180 180 "$ICON_SRC" --out "$APP/AppIcon60x60@3x.png"
            sips -z 152 152 "$ICON_SRC" --out "$APP/AppIcon76x76@2x.png"
            sips -z 167 167 "$ICON_SRC" --out "$APP/AppIcon83.5x83.5@2x.png"
            cp "$ICON_SRC" "$APP/AppIcon1024.png"
            echo "--- icons ---"; ls -la "$APP"/AppIcon*.png
          else
            echo "WARNING: $ICON_SRC not found; app will use the default (no) icon"
          fi
          cp -r touchHLE_dylibs "$APP/touchHLE_dylibs"
          cp -r touchHLE_fonts "$APP/touchHLE_fonts"
          cp touchHLE_default_options.txt "$APP/touchHLE_default_options.txt" || true
          GAME_IPA="$(ls "$GITHUB_WORKSPACE"/*.ipa 2>/dev/null | head -1)"
          echo "Bundling game: $GAME_IPA"
          if [ -n "$GAME_IPA" ] && [ -f "$GAME_IPA" ]; then
            ( cd "$RUNNER_TEMP" && rm -rf jc && mkdir jc && cd jc && unzip -oq "$GAME_IPA" )
            mkdir -p "$APP/touchHLE_apps"
            cp -r "$RUNNER_TEMP"/jc/Payload/*.app "$APP/touchHLE_apps/" || true
          fi
          # ---- Info.plist (printf line-by-line; no base64 to corrupt) ----
          { printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
            printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            printf '%s\n' '<plist version="1.0"><dict>'
            printf '%s\n' '<key>CFBundleName</key><string>touchHLE</string>'
            printf '%s\n' '<key>CFBundleDisplayName</key><string>touchHLE</string>'
            printf '%s\n' '<key>CFBundleIdentifier</key><string>org.touchhle.ios</string>'
            printf '%s\n' '<key>CFBundleExecutable</key><string>touchHLE</string>'
            printf '%s\n' '<key>CFBundleShortVersionString</key><string>0.2.3</string>'
            printf '%s\n' '<key>CFBundleVersion</key><string>0.2.3</string>'
            printf '%s\n' '<key>CFBundlePackageType</key><string>APPL</string>'
            printf '%s\n' '<key>LSRequiresIPhoneOS</key><true/>'
            printf '%s\n' '<key>MinimumOSVersion</key><string>14.0</string>'
            printf '%s\n' '<key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>'
            printf '%s\n' '<key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>'
            printf '%s\n' '<key>UIStatusBarHidden</key><true/>'
            printf '%s\n' '<key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string><string>UIInterfaceOrientationPortrait</string></array>'
            printf '%s\n' '<key>UILaunchScreen</key><dict/>'
            printf '%s\n' '<key>UIApplicationSupportsIndirectInputEvents</key><true/>'
            printf '%s\n' '<key>CFBundleURLTypes</key><array><dict><key>CFBundleURLName</key><string>org.touchhle.ios.run</string><key>CFBundleTypeRole</key><string>Viewer</string><key>CFBundleURLSchemes</key><array><string>touchhle</string></array></dict></array>'
            printf '%s\n' '<key>CFBundleIcons</key><dict><key>CFBundlePrimaryIcon</key><dict><key>CFBundleIconName</key><string>AppIcon</string><key>CFBundleIconFiles</key><array><string>AppIcon60x60</string></array></dict></dict>'
            printf '%s\n' '<key>CFBundleIcons~ipad</key><dict><key>CFBundlePrimaryIcon</key><dict><key>CFBundleIconName</key><string>AppIcon</string><key>CFBundleIconFiles</key><array><string>AppIcon60x60</string><string>AppIcon76x76</string><string>AppIcon83.5x83.5</string></array></dict></dict>'
            printf '%s\n' '</dict></plist>'
          } > "$APP/Info.plist"
          echo "--- Info.plist ---"; cat "$APP/Info.plist"; plutil -lint "$APP/Info.plist" || true
          # ---- entitlements (minimal TrollStore set: JIT only) ----
          { printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
            printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            printf '%s\n' '<plist version="1.0"><dict>'
            printf '%s\n' '<key>get-task-allow</key><true/>'
            printf '%s\n' '<key>dynamic-codesigning</key><true/>'
            printf '%s\n' '</dict></plist>'
          } > "$RUNNER_TEMP/ent.plist"
          plutil -lint "$RUNNER_TEMP/ent.plist" || true
          ldid -S"$RUNNER_TEMP/ent.plist" "$APP/touchHLE"
          ( cd "$RUNNER_TEMP" && zip -qr9 "$GITHUB_WORKSPACE/touchHLE/touchHLE.ipa" Payload )
          DEB="$RUNNER_TEMP/deb"
          mkdir -p "$DEB/var/jb/Applications" "$DEB/DEBIAN"
          cp -r "$APP" "$DEB/var/jb/Applications/touchHLE.app"
          printf 'Package: org.touchhle.ios\nName: touchHLE\nVersion: 0.2.3\nArchitecture: iphoneos-arm64\nDescription: HLE emulator for 32-bit iPhone OS apps (JellyCar)\nMaintainer: BugTracker-BH\nSection: Games\n' > "$DEB/DEBIAN/control"
          dpkg-deb -Zgzip -b "$DEB" touchHLE_rootless.deb
          ls -la touchHLE.ipa touchHLE_rootless.deb
      - name: Upload iOS app + build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: touchHLE-ios-app
          path: |
            touchHLE/touchHLE.ipa
            touchHLE/touchHLE_rootless.deb
            touchHLE/build-ios.log
          if-no-files-found: warn
      - name: Publish IPA to the "v1000" release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1000
          name: v1000
          # First run creates the v1000 tag + release; later runs update the
          # release and replace the .ipa/.deb assets with the freshly built ones.
          make_latest: true
          files: |
            touchHLE/touchHLE.ipa
            touchHLE/touchHLE_rootless.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
