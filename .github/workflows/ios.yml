name: iOS build (touchHLE)

on:
  workflow_dispatch:
  push:
    paths:
      - "touchHLE/**"
      - ".github/workflows/ios.yml"

env:
  CARGO_TERM_COLOR: always
  IPHONEOS_DEPLOYMENT_TARGET: "14.0"
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  ios-app:
    runs-on: macos-15
    defaults:
      run:
        working-directory: touchHLE
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Fetch vendor dependencies
        run: |
          git config --global advice.detachedHead false
          fetch_dep () {  # $1=dir  $2=url  $3=ref
            rm -rf "$1"; mkdir -p "$1"
            git -C "$1" init -q
            git -C "$1" remote add origin "$2"
            for i in 1 2 3 4 5; do
              if git -C "$1" fetch --depth 1 origin "$3"; then
                git -C "$1" checkout -q FETCH_HEAD
                return 0
              fi
              echo "retry $i for $2 ..."; sleep 15
            done
            echo "FAILED to fetch $2"; return 1
          }
          fetch_dep vendor/SDL         https://github.com/libsdl-org/SDL.git    07d0f51fa292895443f563f0cbde4cb3802d87fa
          fetch_dep vendor/dynarmic    https://github.com/touchHLE/dynarmic.git HEAD
          fetch_dep vendor/openal-soft https://github.com/kcat/openal-soft      HEAD
          fetch_dep vendor/stb         https://github.com/nothings/stb.git      dev
          git -C vendor/dynarmic submodule update --init --recursive --depth 1

      - name: Restore embedded data files (Snowsight push sometimes drops these)
        run: |
          mkdir -p touchHLE_apps res vendor/PVRTDecompress
          [ -f touchHLE_apps/README.txt ] || printf 'If you put your .app bundles or .ipa files in this directory, they will show up in the touchHLE app picker.\n' > touchHLE_apps/README.txt
          [ -f OPTIONS_HELP.txt ] || printf 'touchHLE options help (placeholder).\n' > OPTIONS_HELP.txt
          [ -f touchHLE_options.txt ] || : > touchHLE_options.txt
          [ -f vendor/PVRTDecompress/LICENSE.md ] || printf 'PowerVR SDK license (placeholder).\n' > vendor/PVRTDecompress/LICENSE.md
          PNG_B64='iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M8AAAMBAQAY3Y2wAAAAAElFTkSuQmCC'
          for p in res/icon.png res/icon_unofficial.png res/icon_preview.png; do
            [ -f "$p" ] || printf '%s' "$PNG_B64" | openssl base64 -A -d > "$p"
          done

      - name: Install Boost (dynarmic dependency)
        run: |
          brew install boost
          ln -sfn "$(brew --prefix boost)/include" vendor/boost
          ls -la vendor/boost/boost/version.hpp

      - name: Add Rust iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build touchHLE executable (aarch64-apple-ios)
        run: |
          set -euo pipefail
          SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"
          echo "Using SDK=$SDK_PATH"
          cat > "$RUNNER_TEMP/ios-toolchain.cmake" <<EOF
          set(CMAKE_SYSTEM_NAME iOS)
          set(CMAKE_OSX_SYSROOT "$SDK_PATH" CACHE STRING "iOS SDK" FORCE)
          set(CMAKE_OSX_ARCHITECTURES "arm64" CACHE STRING "" FORCE)
          set(CMAKE_OSX_DEPLOYMENT_TARGET "$IPHONEOS_DEPLOYMENT_TARGET" CACHE STRING "" FORCE)
          EOF
          export SDKROOT="$SDK_PATH"
          export CMAKE_OSX_SYSROOT="$SDK_PATH"
          export CMAKE_OSX_SYSROOT_aarch64_apple_ios="$SDK_PATH"
          export CMAKE_TOOLCHAIN_FILE_aarch64_apple_ios="$RUNNER_TEMP/ios-toolchain.cmake"
          FW="Foundation UIKit CoreGraphics QuartzCore OpenGLES CoreVideo CoreAudio AudioToolbox AVFoundation CoreMotion CoreBluetooth CoreHaptics GameController Metal"
          LINKARGS="-Clink-arg=-lobjc"
          for f in $FW; do LINKARGS="$LINKARGS -Clink-arg=-framework -Clink-arg=$f"; done
          export CARGO_TARGET_AARCH64_APPLE_IOS_RUSTFLAGS="$LINKARGS"
          env "CMAKE_OSX_SYSROOT_aarch64-apple-ios=$SDK_PATH" \
              "CMAKE_TOOLCHAIN_FILE_aarch64-apple-ios=$RUNNER_TEMP/ios-toolchain.cmake" \
              cargo build --release --target aarch64-apple-ios --bin touchHLE 2>&1 | tee build-ios.log

      - name: Package signed iOS app (.ipa + rootless .deb)
        run: |
          set -euo pipefail
          brew install ldid dpkg
          BIN=target/aarch64-apple-ios/release/touchHLE
          file "$BIN"
          APP="$RUNNER_TEMP/Payload/touchHLE.app"
          rm -rf "$RUNNER_TEMP/Payload" "$RUNNER_TEMP/deb"
          mkdir -p "$APP"
          cp "$BIN" "$APP/touchHLE"; chmod +x "$APP/touchHLE"
          cp -r touchHLE_dylibs "$APP/touchHLE_dylibs"
          cp -r touchHLE_fonts  "$APP/touchHLE_fonts"
          cp    touchHLE_default_options.txt "$APP/touchHLE_default_options.txt" || true
          GAME_IPA="$GITHUB_WORKSPACE/JellyCar 1.0 (Decrypted).ipa"
          if [ -f "$GAME_IPA" ]; then
            ( cd "$RUNNER_TEMP" && rm -rf jc && mkdir jc && cd jc && unzip -oq "$GAME_IPA" )
            mkdir -p "$APP/touchHLE_apps"
            cp -r "$RUNNER_TEMP"/jc/Payload/*.app "$APP/touchHLE_apps/" || true
          fi
          INFO_B64='Рpb25zPC9rZXk+CiAgPGFycmF5PgogICAgPHN0cmluZz5VSUludGVyZmFjZU9yaWVudGF0aW9uTGFuZHNjYXBlTGVmdDwvc3RyaW5nPgogICAgPHN0cmluZz5VSUludGVyZmFjZU9yaWVudGF0aW9uTGFuZHNjYXBlUmlnaHQ8L3N0cmluZz4KICAgIDxzdHJpbmc+VUlJbnRlcmZhY2VPcmllbnRhdGlvblBvcnRyYWl0PC9zdHJpbmc+CiAgPC9hcnJheT4KPC9kaWN0Pgo8L3BsaXN0Pgo='
          ENT_B64=''
          printf '%s' "$INFO_B64" | openssl base64 -A -d > "$APP/Info.plist"
          printf '%s' "$ENT_B64"  | openssl base64 -A -d > "$RUNNER_TEMP/ent.plist"
          ldid -S"$RUNNER_TEMP/ent.plist" "$APP/touchHLE"
          ( cd "$RUNNER_TEMP" && zip -qr9 "$GITHUB_WORKSPACE/touchHLE/touchHLE.ipa" Payload )
          DEB="$RUNNER_TEMP/deb"
          mkdir -p "$DEB/var/jb/Applications" "$DEB/DEBIAN"
          cp -r "$APP" "$DEB/var/jb/Applications/touchHLE.app"
          printf 'Package: org.touchhle.ios\nName: touchHLE\nVersion: 0.2.3\nArchitecture: iphoneos-arm64\nDescription: HLE emulator for 32-bit iPhone OS apps (JellyCar)\nMaintainer: BugTracker-BH\nSection: Games\n' > "$DEB/DEBIAN/control"
          dpkg-deb -Zgzip -b "$DEB" touchHLE_rootless.deb
          ls -la touchHLE.ipa touchHLE_rootless.deb

      - name: Upload iOS app + build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: touchHLE-ios-app
          path: |
            touchHLE/touchHLE.ipa
            touchHLE/touchHLE_rootless.deb
            touchHLE/build-ios.log
          if-no-files-found: warn
